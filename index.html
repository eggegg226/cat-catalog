<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>猫猫图鉴</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: #fff7fb;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #ff6fae;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .form {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            margin: 5px 0 10px;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            background: #ff6fae;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background: #ff4f97;
        }

        .card-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .name {
            font-size: 18px;
            margin: 8px 0 4px;
            color: #333;
        }

        .desc {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🐱 猫猫图鉴</h1>

    <div class="form">
        <label>猫咪名字：</label>
        <input type="text" id="name" placeholder="例如：小橘">

        <label>猫咪简介：</label>
        <textarea id="desc" placeholder="例如：学校最可爱的流浪猫"></textarea>

        <label>上传猫咪照片：</label>
        <input type="file" id="img" accept="image/*">

        <button onclick="addCat()">添加猫咪</button>
    </div>

    <div class="card-list" id="list"></div>

</div>

<script>
    const catsFile = "cats.json"; // JSON 文件路径

    // 加载并渲染猫咪数据
    async function loadCats() {
        const response = await fetch(catsFile);
        const cats = await response.json();
        const list = document.getElementById("list");
        list.innerHTML = "";

        cats.forEach(cat => {
            list.innerHTML += `
            <div class="card">
                <img src="${cat.img}" alt="猫咪图片">
                <div class="name">${cat.name}</div>
                <div class="desc">${cat.desc}</div>
            </div>`;
        });
    }

    // 添加新猫咪（这里只是一个简单示例，假设你会手动更新 JSON 文件）
    function addCat() {
        const name = document.getElementById("name").value;
        const desc = document.getElementById("desc").value;
        const file = document.getElementById("img").files[0];

        if (!name || !file) {
            alert("请填写名字并上传图片！");
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            const newCat = {
                name: name,
                desc: desc,
                img: e.target.result
            };

            // 你可以将 newCat 添加到 GitHub 仓库中的 cats.json 文件
            alert("新猫咪已添加！你需要手动更新 GitHub 仓库中的 cats.json 文件。");

            loadCats(); // 重新加载猫咪数据
        };

        reader.readAsDataURL(file);
    }

    loadCats(); // 加载猫咪数据
</script>

</body>
</html>
